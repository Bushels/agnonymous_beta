<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta content="IE=Edge" http-equiv="X-UA-Compatible" />
    <meta
      name="description"
      content="Anonymous agricultural transparency platform"
    />
    <base href="/" />

    <!-- iOS meta tags & icons -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />
    <meta name="apple-mobile-web-app-title" content="Agnonymous" />
    <link rel="apple-touch-icon" href="icons/Icon-192.png" />

    <link rel="icon" href="favicon.ico?v=20260424" sizes="any" />
    <link rel="icon" type="image/png" sizes="16x16" href="icons/favicon-16.png?v=20260424" />
    <link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png?v=20260424" />
    <link rel="icon" type="image/png" sizes="48x48" href="favicon.png?v=20260424" />

    <title>Agnonymous</title>
    <link rel="manifest" href="manifest.json" />

    <!-- Microsoft Clarity analytics -->
    <script type="text/javascript">
      (function(c,l,a,r,i,t,y){
          c[a]=c[a]||function(){(c[a].q=c[a].q||[]).push(arguments)};
          t=l.createElement(r);t.async=1;t.src="https://www.clarity.ms/tag/"+i;
          y=l.getElementsByTagName(r)[0];y.parentNode.insertBefore(t,y);
      })(window, document, "clarity", "script", "wgtfhaimxv");
    </script>

    <!-- Defer non-critical scripts to after page load -->
    <style>
      body {
        margin: 0;
        background: #0f100c;
        color: #f7f3e7;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
      }
      #loading-indicator {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        background: #0f100c;
        background: 
          radial-gradient(circle at 50% 50%, rgba(89, 200, 93, 0.12), transparent 50%),
          radial-gradient(circle at 20% 30%, rgba(214, 134, 81, 0.08), transparent 40%),
          #0f100c;
        overflow: hidden;
        z-index: 9999;
        transition: opacity 0.4s cubic-bezier(0.25, 1, 0.5, 1);
      }
      #loading-indicator::before {
        content: '';
        position: absolute;
        width: 200%;
        height: 200%;
        top: -50%;
        left: -50%;
        background: radial-gradient(circle, rgba(89, 200, 93, 0.05) 0%, transparent 60%);
        animation: rotateGlow 25s linear infinite;
        pointer-events: none;
      }
      @keyframes rotateGlow {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }
      .loading-content {
        display: flex;
        flex-direction: column;
        align-items: center;
        text-align: center;
        position: relative;
        z-index: 10;
      }
      .loading-logo-wrap {
        width: 110px;
        height: 110px;
        border-radius: 50%;
        background: rgba(30, 35, 25, 0.6);
        border: 1px solid rgba(89, 200, 93, 0.2);
        display: grid;
        place-items: center;
        margin-bottom: 24px;
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        box-shadow: 
          0 0 30px rgba(89, 200, 93, 0.15),
          inset 0 0 15px rgba(89, 200, 93, 0.1);
        animation: breathe 3s ease-in-out infinite;
      }
      .loading-logo {
        width: 72px;
        height: 72px;
      }
      .loading-title {
        margin: 0;
        font-size: 32px;
        line-height: 1;
        font-weight: 800;
        letter-spacing: 0.15em;
        text-transform: uppercase;
        background: linear-gradient(135deg, #ffffff 0%, #dcdcdc 50%, #b3b3b3 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        animation: trackingExpand 2s cubic-bezier(0.25, 1, 0.5, 1) forwards;
      }
      .loading-copy {
        margin: 12px 0 32px;
        color: rgba(247, 243, 231, 0.6);
        font-size: 13px;
        letter-spacing: 0.08em;
        font-weight: 500;
        text-transform: uppercase;
        animation: fadeInDelayed 1.5s ease-out forwards;
      }
      .loading-spinner {
        width: 28px;
        height: 28px;
        border: 2px solid rgba(247, 243, 231, 0.08);
        border-top-color: #59c85d;
        border-radius: 50%;
        animation: spin 1.2s cubic-bezier(0.55, 0.15, 0.45, 0.85) infinite;
        box-shadow: 0 0 8px rgba(89, 200, 93, 0.3);
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
      @keyframes breathe {
        0%, 100% { 
          transform: scale(1);
          box-shadow: 0 0 30px rgba(89, 200, 93, 0.15), inset 0 0 15px rgba(89, 200, 93, 0.1);
        }
        50% { 
          transform: scale(1.04);
          box-shadow: 0 0 45px rgba(89, 200, 93, 0.25), inset 0 0 20px rgba(89, 200, 93, 0.15);
        }
      }
      @keyframes trackingExpand {
        from { letter-spacing: 0.05em; opacity: 0; }
        to { letter-spacing: 0.15em; opacity: 1; }
      }
      @keyframes fadeInDelayed {
        0% { opacity: 0; transform: translateY(4px); }
        30% { opacity: 0; }
        100% { opacity: 1; transform: translateY(0); }
      }
    </style>
  </head>
  <body>
    <div id="loading-indicator">
      <div class="loading-content" role="status" aria-live="polite">
        <div class="loading-logo-wrap">
          <img
            src="icons/Icon-192.png"
            class="loading-logo"
            alt="Agnonymous anonymous farmer field mark"
          />
        </div>
        <h1 class="loading-title">Agnonymous</h1>
        <p class="loading-copy">Opening the field board</p>
        <div class="loading-spinner" aria-hidden="true"></div>
      </div>
    </div>

    <!-- Firebase configuration is handled inside main.dart using firebase_options.dart -->

    <!-- Main Flutter app - load this first! -->
    <script src="main.dart.js" type="application/javascript"></script>

    <!-- Handle loading indicator removal -->
    <script>
      window.addEventListener('flutter-first-frame', function () {
        var indicator = document.getElementById('loading-indicator');
        if (indicator) {
          indicator.style.opacity = '0';
          setTimeout(function () {
            indicator.remove();
          }, 300);
        }
      });
    </script>

    <!-- Defer non-critical scripts -->
    <script>
      window.addEventListener('flutter-first-frame', function () {
        // Service worker registration
        if ("serviceWorker" in navigator) {
          navigator.serviceWorker.register("flutter_service_worker.js");
        }

        // Firebase is initialized by Flutter/Dart - no JS initialization needed
      });
    </script>
  </body>
</html>
