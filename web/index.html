    <!-- Defer non-critical scripts to after page load -->
    <style>
      body {
        margin: 0;
        background: #fff7e8;
        color: #17211a;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
      }
      #loading-indicator {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        gap: 18px;
        background:
          radial-gradient(circle at 50% 28%, rgba(233, 163, 24, 0.22), transparent 34%),
          linear-gradient(180deg, #ffe9b8 0%, #fff7e8 48%, #eaf5d4 100%);
        z-index: 9999;
        transition: opacity 0.24s ease-out;
      }
      .loading-card {
        width: min(82vw, 340px);
        padding: 26px 22px 22px;
        border: 1px solid #e6dec9;
        border-radius: 30px;
        background: rgba(255, 252, 245, 0.92);
        box-shadow: 0 18px 44px rgba(60, 47, 22, 0.12);
        display: flex;
        flex-direction: column;
        align-items: center;
        text-align: center;
      }
      .loading-logo-wrap {
        width: 86px;
        height: 86px;
        border-radius: 24px;
        background: #fff2d2;
        border: 1px solid #e6dec9;
        display: grid;
        place-items: center;
        margin-bottom: 16px;
        animation: breathe 1.8s ease-in-out infinite;
      }
      .loading-logo {
        width: 62px;
        height: 62px;
      }
      .loading-title {
        margin: 0;
        font-size: 28px;
        line-height: 1;
        font-weight: 900;
        letter-spacing: 0;
      }
      .loading-copy {
        margin: 8px 0 18px;
        color: #66715f;
        font-size: 14px;
        line-height: 1.35;
        font-weight: 700;
      }
      .loading-bar-container {
        width: 100%;
        height: 8px;
        background-color: #e6dec9;
        border-radius: 999px;
        overflow: hidden;
      }
      .loading-bar {
        width: 42%;
        height: 100%;
        background: linear-gradient(90deg, #2f8c43, #e9a318, #e5533d);
        border-radius: 999px;
        animation: loadingSlide 1.15s ease-in-out infinite;
      }
      @keyframes breathe {
        0%, 100% { transform: translateY(0) scale(1); }
        50% { transform: translateY(-2px) scale(1.03); }
      }
      @keyframes loadingSlide {
        0% { transform: translateX(-100%); }
        100% { transform: translateX(250%); }
      }
    </style>
  </head>
  <body>
    <div id="loading-indicator">
      <div class="loading-card" role="status" aria-live="polite">
        <div class="loading-logo-wrap">
          <img src="icons/agnonymous-mark.svg" class="loading-logo" alt="Agnonymous" />
        </div>
        <h1 class="loading-title">Agnonymous</h1>
        <p class="loading-copy">Opening the anonymous board.</p>
        <div class="loading-bar-container" aria-hidden="true">
          <div class="loading-bar"></div>
        </div>
      </div>
    </div>

    <!-- Handle loading indicator removal -->
    <script>
      window.addEventListener('flutter-first-frame', function () {
        var indicator = document.getElementById('loading-indicator');
        if (indicator) {
          indicator.style.opacity = '0';
          setTimeout(function () {
            indicator.remove();
          }, 300);
        }
      });
    </script>

    <!-- Defer non-critical scripts -->
    <script>
      window.addEventListener('flutter-first-frame', function () {
        // Service worker registration
        if ("serviceWorker" in navigator) {
          navigator.serviceWorker.register("flutter_service_worker.js");
        }

        // Firebase is initialized by Flutter/Dart - no JS initialization needed

        // Lazy load AdSense after a delay
        setTimeout(function() {
          var adsense = document.createElement('script');

          adsense.crossOrigin = 'anonymous';
          document.head.appendChild(adsense);

      });
    </script>
