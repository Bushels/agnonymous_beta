    <style>
      body {
        margin: 0;
        background: #171812;
        color: #f7f3e7;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
      }
      #loading-indicator {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        gap: 18px;
        background:
          radial-gradient(circle at 28% 18%, rgba(214, 134, 81, 0.22), transparent 30%),
          radial-gradient(circle at 78% 82%, rgba(89, 200, 93, 0.12), transparent 28%),
          linear-gradient(145deg, #171812 0%, #2d2419 52%, #11130f 100%);
        z-index: 9999;
        transition: opacity 0.24s ease-out;
      }
      .loading-card {
        width: min(82vw, 340px);
        padding: 26px 22px 22px;
        border: 1px solid rgba(247, 243, 231, 0.08);
        border-radius: 14px;
        background: rgba(37, 39, 31, 0.92);
        box-shadow: 0 20px 44px rgba(0, 0, 0, 0.3);
        display: flex;
        flex-direction: column;
        align-items: center;
        text-align: center;
      }
      .loading-logo-wrap {
        width: 92px;
        height: 92px;
        border-radius: 18px;
        background: #1d301d;
        border: 1px solid rgba(89, 200, 93, 0.24);
        display: grid;
        place-items: center;
        margin-bottom: 16px;
        animation: breathe 1.8s ease-in-out infinite;
      }
      .loading-logo {
        width: 74px;
        height: 74px;
      }
      .loading-title {
        margin: 0;
        font-size: 28px;
        line-height: 1;
        font-weight: 900;
        letter-spacing: 0;
      }
      .loading-copy {
        margin: 8px 0 18px;
        color: #b1b6a4;
        font-size: 14px;
        line-height: 1.35;
        font-weight: 700;
      }
      .loading-bar-container {
        width: 100%;
        height: 8px;
        background-color: #3c4034;
        border-radius: 999px;
        overflow: hidden;
      }
      .loading-bar {
        width: 42%;
        height: 100%;
        background: linear-gradient(90deg, #59c85d, #e2be63, #d68651);
        border-radius: 999px;
        animation: loadingSlide 1.15s ease-in-out infinite;
      }
      @keyframes breathe {
        0%, 100% { transform: translateY(0) scale(1); }
        50% { transform: translateY(-2px) scale(1.03); }
      }
      @keyframes loadingSlide {
        0% { transform: translateX(-100%); }
        100% { transform: translateX(250%); }
      }
    </style>

    <!-- Handle loading indicator removal -->
    <script>
      window.addEventListener('flutter-first-frame', function () {
        var indicator = document.getElementById('loading-indicator');
