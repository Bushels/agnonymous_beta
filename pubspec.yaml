name: agnonymous_beta
description: "Anonymous agricultural transparency platform"
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  supabase_flutter: ^2.10.3
  flutter_riverpod: ^3.0.3
  google_fonts: ^6.3.2
  font_awesome_flutter: ^10.12.0
  intl: ^0.20.2
  flutter_dotenv: ^6.0.0
  cupertino_icons: ^1.0.8
  flutter_svg: ^2.2.3
  flutter_svg_provider: ^1.0.7
  logger: ^2.0.2
  html_unescape: ^2.0.0
  firebase_core: ^3.8.1
  firebase_analytics: ^11.4.4
  firebase_crashlytics: ^4.3.3
  google_mobile_ads: ^6.0.0
  image_picker: ^1.2.1
  web: ^1.1.1
  shared_preferences: ^2.5.4
  uuid: ^4.5.2
  http: ^1.6.0
  flutter_animate: ^4.5.2
  confetti: ^0.8.0
  sqlite3: 2.0.0
  path_provider: ^2.1.5
  path: ^1.9.1
  go_router: ^17.1.0
  shimmer: ^3.0.0
  cached_network_image: ^3.4.1
  flutter_hooks: ^0.21.3+1
  hooks_riverpod: ^3.2.1
  firebase_messaging: ^15.2.10
  flutter_map: ^8.2.2
  posthog_flutter: ^5.15.2
  sqlite3_flutter_libs: 0.5.18
  drift: 2.14.0
  fl_chart: ^1.1.1
  flutter_map_marker_cluster_plus: ^1.4.2
  latlong2: ^0.9.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4
  build_runner: ^2.10.4
  mocktail: ^1.0.4
  patrol_cli: ^4.1.0
  patrol: ^4.1.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/app_icon.png"
  adaptive_icon_background: "#111827"
  adaptive_icon_foreground: "assets/images/app_icon_foreground.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/images/
    - assets/grain_data.sqlite
